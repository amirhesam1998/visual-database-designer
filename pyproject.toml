[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 120
# Test fixtures are deliberately raw SQL/migration samples, not real Python.
extend-exclude = ["tests/fixtures", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
