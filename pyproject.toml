[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
markers = [
    "conformance: milestone acceptance gate (the proof-of-contract kit, distinct from unit tests)",
    "live_postgres: requires a real PostgreSQL (set VDB_TEST_POSTGRES_DSN); skipped otherwise",
    "live_mysql: requires a real MySQL/MariaDB (set VDB_TEST_MYSQL_DSN); skipped otherwise",
]

[tool.ruff]
target-version = "py312"
line-length = 120
# Test fixtures are deliberately raw SQL/migration samples, not real Python.
extend-exclude = ["tests/fixtures", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
